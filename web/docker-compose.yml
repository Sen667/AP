services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api
    container_name: fripouilles-web
    env_file:
      - web/.env
    environment:
      API_INTERNAL_URL: http://backend:3000/api
    ports:
      - '3001:3001'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fripouilles-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3001']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

networks:
  fripouilles-network:
    external: true
